name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  kit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            6.0.x
            10.0.x

      - name: Fixture LegacyShop — build + tests (must stay green AND legacy)
        run: dotnet test samples/LegacyShop --nologo

      - name: Plugin manifests and requirements are valid JSON
        run: |
          python3 -m json.tool .claude-plugin/plugin.json > /dev/null
          python3 -m json.tool .claude-plugin/marketplace.json > /dev/null
          python3 -m json.tool requirements.json > /dev/null

      - name: Every phase guide names its RoselineMCP tools
        run: |
          bad=$(grep -L 'analyze_solution\|list_diagnostics\|apply_fixes\|edit_member\|rename_symbol\|find_references\|get_call_graph\|get_symbol_at_position\|search_symbols' skills/legacy-upgrade/references/phase-*.md || true)
          if [ -n "$bad" ]; then echo "Phase guides missing tool names: $bad"; exit 1; fi

      - name: Preflight script runs (required tooling present on runner)
        run: ./scripts/preflight.sh

      - name: Preflight --json emits valid JSON
        run: ./scripts/preflight.sh --json | python3 -m json.tool > /dev/null

      - name: Preflight golden test (requirements.json = source unique)
        run: ./tests/preflight/test.sh

      - name: Repo-profile script golden test (show/detect, TODO-fallback contract)
        run: ./tests/repo-profile/test.sh

      - name: Kit scripts run from a foreign working directory (plugin-install simulation)
        run: |
          KIT="$PWD"
          cd "$(mktemp -d)"
          bash "$KIT/scripts/preflight.sh" --json | python3 -m json.tool > /dev/null
          bash "$KIT/scripts/audit-inventory.sh" "$KIT/samples/LegacyShop" | python3 -m json.tool > /dev/null
          python3 "$KIT/scripts/followups.py" "$KIT/tests/followups/fixture-a" --backlog "$KIT/docs/backlog.md" > /dev/null
          out=$(bash "$KIT/skills/get-repo-profile/scripts/repo-profile.sh" show "$KIT") || true
          [ "$out" = "NO_PROFILE" ]   # kit has no profile: the deterministic answer, from any CWD

      - name: Skill frontmatter conforms to the guide (limits, fields, trigger lists, requirements cross-check)
        run: python3 tests/skills/check-frontmatter.py

      - name: Inventory script runs and emits valid JSON
        run: ./scripts/audit-inventory.sh samples/LegacyShop | python3 -m json.tool > /dev/null

      - name: Templates are valid YAML
        run: |
          python3 -m pip install --quiet PyYAML
          python3 -c "import yaml, glob; [yaml.safe_load(open(f)) for f in glob.glob('templates/*.yml')]"

      - name: Report generator golden test (fixture → HTML assertions)
        run: ./tests/report-dashboard/test.sh

      - name: Followups aggregator golden test (tri, backlog, erreurs, JSON)
        run: ./tests/followups/test.sh

      - name: Contrast checker works (pass AND fail paths)
        run: |
          python3 scripts/contrast-check.py "#000000:#ffffff:sanité"
          if python3 scripts/contrast-check.py "#777777:#888888" >/dev/null 2>&1; then
            echo "contrast-check aurait dû échouer sur une paire illisible"; exit 1
          fi
